<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Event Handling</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    div {
      width: 250px;
      height: 120px;
      background: lightblue;
      margin: 10px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    input,
    select {
      margin: 10px 0;
      padding: 5px;
    }

    #output {
      margin-top: 20px;
      color: blue;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>JavaScript Event Handling Examples</h2>

  <!-- Mouse Events -->
  <button id="clickBtn">Click Me</button>
  <button id="dblBtn">Double Click Me</button>

  <div id="box">Mouse Events Area</div>

  <!-- Keyboard Events -->
  <input type="text" id="textInput" placeholder="Type something">
  <p id="output"></p>

  <!-- Form Events -->
  <form id="myForm">
    <input type="text" placeholder="Enter Name" required>
    <button type="submit">Submit</button>
  </form>

  <!-- Focus Events -->
  <input type="text" id="focusInput" placeholder="Focus on me">


</body>
<script src="./script.js"></script>

</html>
